<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="image/favicon.png">
    <link rel="stylesheet" href="style.css">
    <title>Безпека дошкільників</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <a class="logo" href="#">
                <div class="logo__img_wrapper"></div>
                <img class="logo__img" src="image/logo.png" alt="logo">
                <h1 class="logo__title">Безпека <br> дитини <br> в руках <br> дорослих</h1>
            </a>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__link"><a href="#parents">Батькам</a></li>
                    <li class="nav__link"><a href="#caregivers">Вихователям</a></li>
                    <li class="nav__link"><a href="#footer">Контакти</a></li>
                </ul>
            </nav>
        </header>
    </div>
    <main class="main">
        <section class="hero">
            <h2 class="hero__title">Безпека дитини в руках дорослих</h2>
        </section>
        <section class="parents" id="parents">
            <h2 class="hero__title parents__title">Корисні та цікаві поради батькам</h2>
        </section>
        <section class="caregivers" id="caregivers">
            <h2 class="hero__title parents__title">Матеріали для вихователів</h2>
        </section>
    </main>
    <div class="container">
        <footer class="footer" id="footer">
            <nav class="nav footer__nav">
                <ul class="nav__list footer__nav__list">
                    <li class="nav__link"><a href="#">Контакти</a></li>
                    <li class="nav__link" id="admin"><a href="#">Адмін-панель</a></li>
                </ul>
            </nav>
        </footer>
    </div>
        <div class="modal">
            <div class="modal__block">
                <h2>Введіть пароль</h2>
                <input class="input" type="number" id="input">
                <button type="button" id="button">Увійти</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
